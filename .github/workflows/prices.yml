name: prices
on:
  schedule:
    - cron: '0,30 13-21 * * 1-5'   # 平日 13:00〜21:30 UTC の30分毎（EDT/EST両対応）
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: globe-prices
  cancel-in-progress: true
jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Update prices
        run: python main.py prices
      - name: Commit prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/prices.json
          git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no changes"
          git push
