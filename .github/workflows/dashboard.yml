name: dashboard
on:
  schedule:
    - cron: '30 21 * * *'      # 毎日 21:30 UTC（米国引け後）
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: globe-pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build dashboard
        run: python main.py report
      - name: Commit docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: update dashboard $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no changes"
          git push
